spring:
  profiles:
    active: local
    include: secret
  application:
    name: spring-plus
  # Redis 설정 추가
  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
    open-in-view: false

logging:
  level:
    root: info

server:
  port: 8080